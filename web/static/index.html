<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tfview</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
  h1 { font-size: 1.5rem; }
  .controls { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }
  #output { background: #f5f5f5; padding: 1rem; overflow-x: auto; min-height: 4rem;
            border: 1px solid #ddd; border-radius: 4px; font-size: 0.85rem; white-space: pre; }
  button:disabled { opacity: 0.5; }
</style>
</head>
<body>
<h1>tfview</h1>
<div class="controls">
  <input type="file" id="file" accept=".tflite">
  <select id="sample">
    <option value="">-- or select a sample model --</option>
    <option value="https://storage.googleapis.com/download.tensorflow.org/models/tflite/gpu/multi_person_mobilenet_v1_075_float.tflite">multi_person_mobilenet_v1_075_float</option>
    <option value="https://storage.googleapis.com/download.tensorflow.org/models/tflite/gpu/deeplabv3_257_mv_gpu.tflite">deeplabv3_257_mv_gpu</option>
    <option value="https://storage.googleapis.com/download.tensorflow.org/models/tflite/text_classification/text_classification.tflite">text_classification</option>
  </select>
  <button id="download" disabled>Download as text</button>
</div>
<pre id="output">Select a .tflite file to view its structure.</pre>
<script src="tfview.js"></script>
<script>
(function() {
  var fileInput = document.getElementById('file');
  var sampleSelect = document.getElementById('sample');
  var output = document.getElementById('output');
  var downloadBtn = document.getElementById('download');
  var currentText = '';
  var currentName = 'model';

  function parseBytes(bytes, name) {
    try {
      currentText = tfview.parse(bytes);
      currentName = name;
      output.textContent = currentText;
      downloadBtn.disabled = false;
    } catch(err) {
      output.textContent = 'Error: ' + err.message;
      downloadBtn.disabled = true;
    }
  }

  fileInput.addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    sampleSelect.value = '';
    output.textContent = 'Loading...';
    var reader = new FileReader();
    reader.onload = function(ev) {
      parseBytes(new Uint8Array(ev.target.result), file.name);
    };
    reader.readAsArrayBuffer(file);
  });

  sampleSelect.addEventListener('change', function() {
    var url = sampleSelect.value;
    if (!url) return;
    fileInput.value = '';
    var name = url.split('/').pop();
    output.textContent = 'Downloading ' + name + '...';
    downloadBtn.disabled = true;
    fetch(url).then(function(r) { return r.arrayBuffer(); }).then(function(buf) {
      parseBytes(new Uint8Array(buf), name);
    }).catch(function(err) {
      output.textContent = 'Download failed: ' + err.message;
    });
  });

  downloadBtn.addEventListener('click', function() {
    var blob = new Blob([currentText], {type: 'text/plain'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = currentName + '.txt';
    a.click();
    URL.revokeObjectURL(url);
  });
})();
</script>
</body>
</html>
