<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tfview (melange)</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
  h1 { font-size: 1.5rem; }
  .controls { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }
  #output { background: #f5f5f5; padding: 1rem; overflow-x: auto; min-height: 4rem;
            border: 1px solid #ddd; border-radius: 4px; font-size: 0.85rem; white-space: pre; }
  button:disabled { opacity: 0.5; }
</style>
</head>
<body>
<h1>tfview <small>(melange)</small></h1>
<div class="controls">
  <input type="file" id="file" accept=".tflite">
  <button id="download" disabled>Download as text</button>
</div>
<pre id="output">Select a .tflite file to view its structure.</pre>
<script src="tfview_mel_web.bundle.js"></script>
<script>
(function() {
  var fileInput = document.getElementById('file');
  var output = document.getElementById('output');
  var downloadBtn = document.getElementById('download');
  var currentText = '';

  fileInput.addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    output.textContent = 'Loading...';
    var reader = new FileReader();
    reader.onload = function(ev) {
      var bytes = new Uint8Array(ev.target.result);
      var binaryStr = '';
      for (var i = 0; i < bytes.length; i++) {
        binaryStr += String.fromCharCode(bytes[i]);
      }
      try {
        currentText = tfview.parse(binaryStr);
        output.textContent = currentText;
        downloadBtn.disabled = false;
      } catch(err) {
        output.textContent = 'Error: ' + err.message;
        downloadBtn.disabled = true;
      }
    };
    reader.readAsArrayBuffer(file);
  });

  downloadBtn.addEventListener('click', function() {
    var blob = new Blob([currentText], {type: 'text/plain'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = (fileInput.files[0] ? fileInput.files[0].name : 'model') + '.txt';
    a.click();
    URL.revokeObjectURL(url);
  });
})();
</script>
</body>
</html>
