name: devcontainer
description: Setup devcontainer on GitHub runner
inputs:
  name:
    description: 'Name of container saved in the repository'
    required: false
    default: 'devcontainer'
  variant:
    description: 'Extra tag appended to the image name (e.g. an OCaml version); empty string omits it'
    required: false
    default: ''
  platform:
    description: 'Target platform for the build (e.g. linux/amd64, linux/i386, linux/arm64, linux/arm/v7); empty means native'
    required: false
    default: ''
  registry:
    description: 'Docker registry server address'
    required: false
    default: 'ghcr.io'
  username:
    description: 'Username for Docker registry'
    required: false
    default: ''
  password:
    description: 'Password or token for Docker registry'
    required: false
    default: ''

outputs:
  exec:
    description: 'Command prefix to run commands in the container'
    value: ${{ steps.setup.outputs.exec }}

runs:
  using: "composite"
  steps:
    - name: devcontainer setup
      shell: bash
      id: setup
      run: |
        echo "::group::cache"
        npm install -g @devcontainers/cli
        PLATFORM='${{ inputs.platform }}'
        if [ -n "$PLATFORM" ]; then
          ARCH=$(echo "$PLATFORM" | sed 's|linux/||; s|/||g')
          export DOCKER_DEFAULT_PLATFORM="$PLATFORM"
        else
          ARCH=$(uname -m)
        fi
        VARIANT='${{ inputs.variant }}'
        VARIANT_SUFFIX="${VARIANT:+-${VARIANT}}"
        IMAGE_ID=${{ inputs.registry }}/$GITHUB_REPOSITORY/${{ inputs.name }}${VARIANT_SUFFIX}-${ARCH}
        IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
        TAG="$GITHUB_REF_NAME"
        TAG=$(echo $TAG | tr '[A-Z].' '[a-z]_')
        old_id=''
        if docker pull $IMAGE_ID:$TAG; then
          old_id=$(docker image inspect $IMAGE_ID:$TAG --format "{{.ID}}")
        fi
        echo "::group::mounts"
        mkdir -p ~/.claude
        touch ~/.claude.json
        echo "::group::build"
        env BUILDKIT_PROGRESS=plain devcontainer build --image-name $IMAGE_ID --cache-from $IMAGE_ID:$TAG --workspace-folder .
        echo "::group::up"
        env BUILDKIT_PROGRESS=plain devcontainer up --workspace-folder .
        echo "exec=devcontainer exec --workspace-folder ." >> $GITHUB_OUTPUT
        echo "::group::push"
        if [ -n '${{ inputs.password }}' ]; then
          new_id=$(docker image inspect $IMAGE_ID --format "{{.ID}}")
          if docker tag $IMAGE_ID $IMAGE_ID:$TAG ; then
            if [ "$old_id" != "$new_id" ]; then
              username='${{ inputs.username }}'
              echo '${{ inputs.password }}' | docker login ${{ inputs.registry }} -u ${username:-'${{ github.actor }}'} --password-stdin
              if docker push $IMAGE_ID:$TAG ; then
                echo "::info :: pushed $IMAGE_ID:$TAG"
              else
                echo "::warning :: can't push $IMAGE_ID:$TAG"
              fi
              docker logout ${{ inputs.registry }}
            fi
          fi
        fi
